services:
  - type: web
    name: onlinefact-mcp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python onlinefact_server.py
    envVars:
      - key: MCP_TRANSPORT
        value: sse
      - key: ONLINEFACT_API_URL
        sync: false
      - key: ONLINEFACT_API_KEY
        sync: false
      - key: ONLINEFACT_API_SECRET
        sync: false
